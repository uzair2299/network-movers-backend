# Staging Profile (stage)
# Datasource reads credentials and connection info from environment variables provided by Railway/hosting.
# Preferred env vars: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
# Example values are set in your deployment environment; defaults below keep local/dev fallback values.

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.info.enabled=true
management.info.app.name=network-movers
management.info.app.description=Network Movers backend platform
spring.datasource.url=jdbc:postgresql://${PGHOST:RAILWAY_PRIVATE_DOMAIN}:${PGPORT:5432}/${PGDATABASE:railway}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:OXCkyxZXqSlcBXFDEzxfxLFeDNpaNdhb}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings for staging
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Optional: if your DB requires SSL, enable these and configure certs accordingly
# spring.datasource.hikari.data-source-properties.ssl=true
