# Network Movers Core Application Configuration
spring.application.name=network-movers
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Web Server Configuration
server.port=${PORT:8081}
server.servlet.context-path=/api/v1

# Jackson JSON Configuration
spring.jackson.default-property-inclusion=non_null

# Spring JPA & Hibernate Configurations
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Database Migration Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Custom JWT Properties
security.jwt.token-validity=18000
security.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3Ryb25nLXNlY3JldC1rZXktZm9yLW5ldHdvcmstbW92ZXJzLWVudGVycHJpc2UtcGxhdGZvcm0=}
