# Network Movers Core Application Configuration
spring.application.name=network-movers
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Web Server Configuration
server.port=${PORT:8081}
# server.servlet.context-path=/api/v1

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.info.enabled=true
management.info.app.name=network-movers
management.info.app.description=Network Movers backend platform

# Jackson JSON Configuration
spring.jackson.default-property-inclusion=non_null

# Spring JPA & Hibernate Configurations
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Custom JWT Properties
security.jwt.token-validity=18000
security.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3Ryb25nLXNlY3JldC1rZXktZm9yLW5ldHdvcmstbW92ZXJzLWVudGVycHJpc2UtcGxhdGZvcm0=}

# Debug Logging
logging.level.org.flywaydb=DEBUG
debug=true
